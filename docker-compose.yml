version: '3.9'
services:
  db:
    image: postgres:16-alpine
    container_name: social_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: social
      POSTGRES_PASSWORD: social
      POSTGRES_DB: social_dev
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: social_server
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://social:social@db:5432/social_dev?schema=public
      NODE_ENV: development
    ports:
      - "4000:4000"
    volumes:
      - ./server:/app
    command: sh -c "npm install && npx prisma generate && npx prisma migrate deploy && npm run dev"

volumes:
  db_data: